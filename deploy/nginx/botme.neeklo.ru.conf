# =====================================================
# /etc/nginx/sites-available/botme.neeklo.ru
# Архитектура VPS: HAProxy(:443, SNI passthrough) -> Nginx(127.0.0.1:9443, SSL)
# Поэтому в этом конфиге nginx слушает 9443 на loopback, а не 443.
#
# Установка (см. DEPLOY.md, выполняется один раз):
#   sudo cp deploy/nginx/botme.neeklo.ru.conf /etc/nginx/sites-available/botme.neeklo.ru
#   sudo ln -sf /etc/nginx/sites-available/botme.neeklo.ru /etc/nginx/sites-enabled/botme.neeklo.ru
#   echo "botme.neeklo.ru bk_nginx" | sudo tee -a /var/lib/haproxy/sni-web.map
#   sudo systemctl reload haproxy
#   sudo nginx -t && sudo systemctl reload nginx
#
# Сертификат (через webroot, чтобы не трогать чужие nginx-конфиги):
#   sudo certbot certonly --webroot -w /var/www/html \
#     -d botme.neeklo.ru \
#     --cert-name botme.neeklo.ru \
#     --no-eff-email -m admin@neeklo.ru --agree-tos
#   После выпуска — раскомментировать ssl_* и `sudo nginx -s reload`.
# =====================================================

# HTTP — только acme-challenge и редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name botme.neeklo.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS внутренний — терминируется nginx, к нам приходит уже от haproxy
server {
    listen [::1]:9443 ssl ipv6only=on;
    listen 127.0.0.1:9443 ssl;
    http2 on;
    server_name botme.neeklo.ru;

    ssl_certificate     /etc/letsencrypt/live/botme.neeklo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/botme.neeklo.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50M;

    access_log /var/log/nginx/botme.neeklo.ru.access.log;
    error_log  /var/log/nginx/botme.neeklo.ru.error.log;

    # =========================================================
    # SSE (Server-Sent Events) — стриминг ответов LLM
    # /api/assistants/.../chat?stream=1 и /api/v1/chat?stream=1
    # =========================================================
    location ~ ^/api/(assistants|v1)/ {
        proxy_pass         http://127.0.0.1:3015;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Origin            $http_origin;
        proxy_set_header   Authorization     $http_authorization;

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
        proxy_set_header   Connection "";
    }

    # =========================================================
    # Всё остальное: статика, /preview/, остальные /api/*
    # =========================================================
    location / {
        proxy_pass         http://127.0.0.1:3015;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
