# =====================================================
# /etc/nginx/sites-available/botme.neeklo.ru
# Reverse-proxy Node.js (PM2) -> https://botme.neeklo.ru
#
# Установка:
#   sudo cp deploy/nginx/botme.neeklo.ru.conf /etc/nginx/sites-available/botme.neeklo.ru
#   sudo ln -sf /etc/nginx/sites-available/botme.neeklo.ru /etc/nginx/sites-enabled/botme.neeklo.ru
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL:
#   sudo certbot --nginx -d botme.neeklo.ru --cert-name botme.neeklo.ru \
#     --redirect --no-eff-email -m admin@neeklo.ru --agree-tos
#
# ВАЖНО: используется свой cert-name=botme.neeklo.ru, чужие сертификаты
# на этом сервере не затрагиваются.
# =====================================================

# HTTP -> HTTPS редирект (certbot обычно делает сам, но дублируем явно)
server {
    listen 80;
    listen [::]:80;
    server_name botme.neeklo.ru;

    # Для challenge'ов certbot
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Основной HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name botme.neeklo.ru;

    # SSL — пути подставит certbot после --nginx
    # ssl_certificate     /etc/letsencrypt/live/botme.neeklo.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/botme.neeklo.ru/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Безопасность
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Загрузка PDF/DOCX/больших баз знаний
    client_max_body_size 50M;

    # Доступ к виджету и публичному API кросс-доменно (он сам шлёт CORS)
    # Никаких рестрикшнов на nginx-уровне.

    # Логи отдельно от других сайтов
    access_log /var/log/nginx/botme.neeklo.ru.access.log;
    error_log  /var/log/nginx/botme.neeklo.ru.error.log;

    # =========================================================
    # SSE (Server-Sent Events) — стриминг ответов LLM
    # /api/assistants/.../chat?stream=1 и /api/v1/chat?stream=1
    # =========================================================
    location ~ ^/api/(assistants|v1)/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Origin            $http_origin;
        proxy_set_header   Authorization     $http_authorization;

        # Критично для SSE: без буферизации, длинный таймаут
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;

        # Закрыть keepalive для SSE
        proxy_set_header   Connection "";
    }

    # =========================================================
    # Превью сгенерированных проектов / общий API / статика
    # =========================================================
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
