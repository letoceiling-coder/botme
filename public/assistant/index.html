<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI-Ассистенты — Botme</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: {
      bg: '#0b0d12', panel: '#11141b', panel2: '#161a23',
      border: '#222836', text: '#e6e8ee', muted: '#8a93a6',
      brand: '#7c5cff', brand2: '#22d3ee',
      ok: '#22c55e', err: '#ef4444',
    }}},
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="/assistant/style.css" rel="stylesheet" />
</head>
<body class="bg-bg text-text min-h-screen">

<!-- Header -->
<header class="border-b border-border bg-panel/80 backdrop-blur sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="/assistant/" class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand to-brand2 flex items-center justify-center font-bold text-white shadow-lg">AI</div>
      <div>
        <div class="font-semibold leading-tight">Botme Ассистенты</div>
        <div class="text-xs text-muted">База знаний · RAG · API · Виджет</div>
      </div>
    </a>
    <nav class="flex items-center gap-2">
      <a href="/" class="text-xs px-3 py-2 rounded-lg bg-panel2 border border-border hover:border-brand/50">← Генератор сайтов</a>
      <button id="newAsstBtn" class="text-sm px-4 py-2 rounded-lg bg-gradient-to-r from-brand to-brand2 text-white font-medium hover:opacity-90">
        + Новый ассистент
      </button>
    </nav>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-8">
  <div class="flex items-end justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold">Ваши ассистенты</h1>
      <p class="text-sm text-muted mt-1">Создайте AI-ассистента, обучите его на ваших документах, подключите к сайту через виджет или API.</p>
    </div>
  </div>

  <div id="assistantsList" class="grid md:grid-cols-2 gap-4">
    <div class="text-muted text-sm py-12 text-center col-span-full">Загрузка…</div>
  </div>
</main>

<!-- Модалка создания -->
<div id="createModal" class="modal-bg hidden">
  <div class="modal-card">
    <div class="flex items-center justify-between mb-5">
      <div>
        <div class="text-lg font-semibold">Новый ассистент</div>
        <div class="text-xs text-muted mt-0.5">Дайте имя и краткое описание. Остальное настроите внутри.</div>
      </div>
      <button id="closeModal" class="w-8 h-8 rounded-md bg-panel2 border border-border hover:border-brand/50 text-lg leading-none">×</button>
    </div>
    <form id="createForm" class="space-y-3">
      <div>
        <label class="block text-xs uppercase tracking-wider text-muted mb-1">Название</label>
        <input id="newName" type="text" required maxlength="200"
          placeholder="Например: Поддержка магазина"
          class="w-full bg-panel2 border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand/50" />
      </div>
      <div>
        <label class="block text-xs uppercase tracking-wider text-muted mb-1">Описание (опц.)</label>
        <input id="newDescription" type="text" maxlength="500"
          placeholder="Кому помогает и в чём"
          class="w-full bg-panel2 border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand/50" />
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <button type="button" id="cancelCreate" class="text-sm px-3 py-2 rounded-lg bg-panel2 border border-border hover:border-muted/50">Отмена</button>
        <button type="submit" class="text-sm px-4 py-2 rounded-lg bg-gradient-to-r from-brand to-brand2 text-white font-medium hover:opacity-90">
          Создать
        </button>
      </div>
    </form>
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const fmt = (n) => Number(n || 0).toLocaleString('ru-RU');

const PROVIDER_DOT = { claude: '#d97706', openai: '#10a37f', gemini: '#4285f4', ollama: '#a78bfa' };

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
}

function modelLabel(m) {
  if (!m) return '—';
  return m.split(':').slice(1).join(':') || m;
}

async function load() {
  const list = await fetch('/api/assistants').then((r) => r.json());
  const el = $('#assistantsList');
  if (!list.length) {
    el.innerHTML = `<div class="text-muted text-sm py-16 text-center col-span-full">
      У вас пока нет ассистентов.<br>
      <button id="firstCreate" class="mt-4 text-sm px-4 py-2 rounded-lg bg-gradient-to-r from-brand to-brand2 text-white font-medium">+ Создать первого</button>
    </div>`;
    document.getElementById('firstCreate').onclick = openModal;
    return;
  }
  el.innerHTML = list.map(renderCard).join('');
}

function renderCard(a) {
  const provider = (a.model || '').split(':')[0];
  const dotColor = PROVIDER_DOT[provider] || '#6b7280';
  return `
  <a class="asst-card" href="/assistant/assistant.html?id=${encodeURIComponent(a.id)}">
    <div class="flex items-start justify-between gap-2">
      <div class="min-w-0 flex-1">
        <div class="font-semibold text-base truncate">${escapeHtml(a.name)}</div>
        <div class="text-xs text-muted mt-0.5 line-clamp-2">${escapeHtml(a.description || 'Без описания')}</div>
      </div>
      <span class="provider-pill"><span class="dot" style="background:${dotColor};color:${dotColor}"></span>${escapeHtml(modelLabel(a.model))}</span>
    </div>
    <div class="asst-card-meta">
      <div class="asst-stat"><div class="asst-stat-label">Документы</div><div class="asst-stat-value">${fmt(a.doc_count)}</div></div>
      <div class="asst-stat"><div class="asst-stat-label">Чанки</div><div class="asst-stat-value">${fmt(a.chunk_count)}</div></div>
      <div class="asst-stat"><div class="asst-stat-label">Лиды</div><div class="asst-stat-value">${fmt(a.lead_count)}</div></div>
      <div class="asst-stat"><div class="asst-stat-label">Токены</div><div class="asst-stat-value">${fmt(a.tokens_total)}</div></div>
    </div>
  </a>`;
}

function openModal()  { $('#createModal').classList.remove('hidden'); $('#newName').focus(); }
function closeModal() { $('#createModal').classList.add('hidden'); $('#createForm').reset(); }

$('#newAsstBtn').onclick = openModal;
$('#closeModal').onclick = closeModal;
$('#cancelCreate').onclick = closeModal;
$('#createModal').addEventListener('click', (e) => { if (e.target.id === 'createModal') closeModal(); });

$('#createForm').onsubmit = async (e) => {
  e.preventDefault();
  const name = $('#newName').value.trim();
  const description = $('#newDescription').value.trim();
  if (!name) return;
  const r = await fetch('/api/assistants', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, description }),
  }).then((r) => r.json());
  closeModal();
  location.href = `/assistant/assistant.html?id=${encodeURIComponent(r.id)}`;
};

load();
</script>
</body>
</html>
