<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Вход — Botme</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: '#0b0d12', panel: '#11141b', panel2: '#161a23',
          border: '#222836', text: '#e6e8ee', muted: '#8a93a6',
          brand: '#7c5cff', brand2: '#22d3ee',
          err: '#ef4444',
        },
      },
    },
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  body { font-family: Inter, system-ui, sans-serif; }
  @keyframes botme-shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .botme-title {
    background: linear-gradient(90deg, #7c5cff, #22d3ee, #a78bfa, #34d399, #7c5cff);
    background-size: 280% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: botme-shimmer 5s ease infinite;
  }
  .logo-ring {
    animation: pulse-ring 3s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(124, 92, 255, 0.35); }
    50% { box-shadow: 0 0 28px 8px rgba(34, 211, 238, 0.15); }
  }
</style>
</head>
<body class="bg-bg text-text min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
  <div class="absolute inset-0 pointer-events-none opacity-40" aria-hidden="true"
    style="background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124,92,255,0.25), transparent),
           radial-gradient(ellipse 60% 40% at 100% 50%, rgba(34,211,238,0.12), transparent);"></div>

  <div class="relative w-full max-w-[420px] rounded-2xl border border-border bg-panel p-8 shadow-2xl shadow-black/40">
    <div class="flex flex-col items-center gap-4 mb-8">
      <div class="logo-ring rounded-2xl p-1 bg-gradient-to-br from-brand/50 to-brand2/50">
        <img src="/brand/botme.jpg" alt="Botme" width="88" height="88"
          class="rounded-xl object-cover w-[88px] h-[88px] bg-panel2 border border-border" />
      </div>
      <h1 class="botme-title text-4xl font-extrabold tracking-tight">Botme</h1>
      <p class="text-xs text-muted text-center">Вход в панель управления<br /><span class="text-muted/80">Site Builder · AI-ассистенты</span></p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-xs uppercase tracking-wider text-muted mb-1">Email</label>
        <input id="email" type="email" autocomplete="username" required
          class="w-full bg-panel2 border border-border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-brand/60 focus:ring-1 focus:ring-brand/30"
          placeholder="you@example.com" />
      </div>
      <div>
        <label class="block text-xs uppercase tracking-wider text-muted mb-1">Пароль</label>
        <input id="password" type="password" autocomplete="current-password" required
          class="w-full bg-panel2 border border-border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-brand/60 focus:ring-1 focus:ring-brand/30"
          placeholder="••••••••" />
      </div>
      <p id="loginErr" class="text-xs text-err hidden"></p>
      <button type="submit"
        class="w-full py-3 rounded-xl bg-gradient-to-r from-brand to-brand2 text-white font-semibold text-sm hover:opacity-95 transition shadow-lg shadow-brand/20">
        Войти
      </button>
    </form>
  </div>
  <p class="relative mt-8 text-[11px] text-muted/70">Регистрация недоступна — доступ выдаёт администратор.</p>

<script>
(function () {
  fetch('/api/auth/me', { credentials: 'same-origin' })
    .then(function (r) {
      if (r.ok) {
        var q = new URLSearchParams(location.search).get('redirect');
        location.href = q && q.startsWith('/') ? q : '/';
      }
    })
    .catch(function () {});

  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    var err = document.getElementById('loginErr');
    err.classList.add('hidden');
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    try {
      var r = await fetch('/api/auth/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password }),
      });
      var j = await r.json().catch(function () { return {}; });
      if (!r.ok) throw new Error(j.error || 'Ошибка входа');
      var redir = new URLSearchParams(location.search).get('redirect');
      location.href = redir && redir.startsWith('/') ? redir : '/';
    } catch (x) {
      err.textContent = x.message || 'Ошибка';
      err.classList.remove('hidden');
    }
  });
})();
</script>
</body>
</html>
